<!-- core/templates/core/rpa.html -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Automação</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .resultado {margin-top: 20px; padding: 15px; background-color: #f9f9f9; border: 1px solid #ccc;}
        .erro {background-color: #ffebee; color: #c62828;}
    </style>
</head>
<body>
    <header>
        <h1>TechNova - RPA</h1>
        <nav>
            <ul>
                <li><a href="{% url 'home' %}">Início</a></li>
                <li><a href="{% url 'sobre' %}">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Iniciar Automação Web</h2>
        <p>Digite uma URL para coletar informações automaticamente</p>

        <form id="rpaForm">
            {% csrf_token %}
            <input type="text" name="url" placeholder="Digite a URL (ex.: google.com)" required style="width: 300px; padding: 8px;">
            <button type="submit" style="padding: 8px 16px;">Iniciar Automação</button>
        </form>

        <div id="resultado"></div>
    </main>

    <script>
        document.getElementById('rpaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultadoDiv = document.getElementById('resultado');

            fetch("{% url 'iniciar_rpa' %}", {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                let html = `<div class="resultado ${data.sucesso ? '' : 'erro'}">
                    <strong>Resultado:</strong><br>
                    URL: ${data.url} <br>
                    Título: ${data.titulo || '-'} <br>
                    H1: ${data.h1 || '-'} <br>
                    Mensagem: ${data.mensagem}
                    </div>`;
                resultadoDiv.innerHTML = html;
            })
            .catch(err => {
                resultadoDiv.innerHTML = "<div class='erro'><strong>Erro:</strong> Erro de conexão com o servidor.</div>";
            });
        });
    </script>
</body>
</html>
